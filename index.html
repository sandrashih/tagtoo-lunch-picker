<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今天午餐吃什麼 What's for Lunch Today?</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #B74133;
      --primary-dark: #9a3229;
      --bg: #F5F5F5;
      --surface: #ffffff;
      --border: #E0E0E0;
      --text: #434343;
      --title: #384750;
      --muted: #969696;
      --r: 12px;
      --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); }

    .header { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
    .header-left { display:flex; align-items:center; gap:10px; }
    .header-logo { height:28px; width:auto; }
    .header h1 { font-size:1.4rem; font-weight:700; color:var(--title); }
    .header-actions { display:flex; gap:10px; }

    .main { display:grid; grid-template-columns:360px 1fr; gap:20px; padding:20px 24px; max-width:1280px; margin:0 auto; }
    @media(max-width:768px){ .main{ grid-template-columns:1fr; } }
    .left-panel,.right-panel { display:flex; flex-direction:column; gap:16px; }

    .card { background:var(--surface); border-radius:var(--r); padding:16px; box-shadow:var(--shadow); }
    .card-dimmed { opacity:.45; pointer-events:none; transition:opacity .2s; }
    .section-title { font-size:0.82rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:12px; }

    /* filters */
    .filter-row { margin-bottom:10px; }
    .filter-row label { display:block; font-size:0.8rem; color:var(--muted); margin-bottom:5px; font-weight:500; }
    .chips { display:flex; flex-wrap:wrap; gap:6px; }
    .chip { border:1px solid var(--border); background:var(--bg); border-radius:20px; padding:4px 12px; font-size:0.8rem; cursor:pointer; transition:all .15s; }
    .chip:hover { border-color:var(--primary); color:var(--primary); }
    .chip.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    select { width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:8px; font-size:0.88rem; background:var(--bg); cursor:pointer; }

    /* spin */
    .spin-display { width:100%; min-height:140px; border:2px solid var(--border); border-radius:var(--r); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center; background:var(--bg); transition:border-color .2s; }
    .spin-display.spinning { border-color:var(--primary); animation:pulse .3s ease infinite alternate; }
    .spin-display.won { border-color:var(--primary); background:#fff7ed; animation:pop .4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes pulse { from{box-shadow:0 0 0 0 rgba(249,115,22,.2)} to{box-shadow:0 0 0 6px rgba(249,115,22,0)} }
    @keyframes pop { from{transform:scale(.92)} to{transform:scale(1)} }
    @keyframes rollin { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .rolling-name { font-size:1.4rem; font-weight:700; color:var(--primary); animation:rollin .08s ease; }
    .result-label { font-size:0.75rem; color:var(--primary); font-weight:700; text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; }
    .result-name { font-size:1.5rem; font-weight:800; margin-bottom:6px; }
    .result-meta { font-size:0.82rem; color:var(--muted); margin-bottom:2px; }
    .result-link { display:inline-block; margin-top:6px; color:var(--primary); font-size:0.82rem; font-weight:600; text-decoration:none; }
    .result-link:hover { text-decoration:underline; }
    .spin-placeholder { font-size:3rem; }

    .btn-spin { padding:13px; background:var(--primary); color:#fff; border:none; border-radius:var(--r); font-size:1.05rem; font-weight:700; cursor:pointer; transition:background .15s,transform .1s; margin-top:2px; }
    .btn-spin:hover:not(:disabled) { background:var(--primary-dark); transform:translateY(-1px); }
    .btn-spin:disabled { opacity:.6; cursor:default; }
    .btn-random { padding:13px; background:var(--bg); border:2px solid var(--primary); color:var(--primary); border-radius:var(--r); font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .15s; margin-top:2px; display:flex; align-items:center; justify-content:center; gap:6px; }
    .btn-random:hover:not(:disabled) { background:var(--primary); color:#fff; }
    .btn-random:disabled { opacity:.6; cursor:default; }
    .count { font-size:0.8rem; color:var(--muted); text-align:right; }
    .no-result { font-size:0.82rem; color:var(--muted); text-align:center; }

    /* map */
    #map { height:460px; border-radius:8px; }
    .office-marker { font-size:24px; line-height:1; }
    .map-marker { display:flex; align-items:center; gap:4px; white-space:nowrap; }
    .marker-dot { width:7px; height:7px; background:var(--primary); border:1.5px solid #fff; border-radius:50%; box-shadow:0 1px 3px rgba(0,0,0,.3); flex-shrink:0; }
    .winner-dot { width:16px; height:16px; border:2.5px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.4); }
    .marker-label { background:#fff; color:var(--text); font-size:0.72rem; font-weight:600; padding:2px 7px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,.35), 0 1px 2px rgba(0,0,0,.2); border:1px solid rgba(0,0,0,.08); }
    .winner-label { background:var(--primary); color:#fff; border-color:var(--primary); font-size:0.78rem; }

    /* buttons */
    .btn-primary { background:var(--primary); color:#fff; border:none; border-radius:8px; padding:9px 20px; font-size:0.9rem; font-weight:600; cursor:pointer; }
    .btn-primary:hover:not(:disabled) { background:var(--primary-dark); }
    .btn-primary:disabled { opacity:.6; cursor:default; }
    .btn-secondary { background:transparent; color:var(--muted); border:1px solid var(--border); border-radius:8px; padding:9px 20px; font-size:0.9rem; cursor:pointer; }
    .btn-secondary:hover { border-color:var(--muted); }
    .btn-add { background:var(--primary); color:#fff; border:none; border-radius:8px; padding:8px 16px; font-size:0.88rem; font-weight:600; cursor:pointer; }
    .btn-add:hover { background:var(--primary-dark); }
    .lang-toggle { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:8px 14px; font-size:0.82rem; font-weight:600; cursor:pointer; }
    .lang-toggle:hover { border-color:var(--primary); }

    /* modal */
    .backdrop { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; z-index:999; animation:fadein .15s; }
    @keyframes fadein { from{opacity:0} to{opacity:1} }
    .modal { background:var(--surface); border-radius:var(--r); padding:28px; width:min(480px,90vw); box-shadow:0 20px 60px rgba(0,0,0,.2); animation:slideup .2s ease; }
    @keyframes slideup { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal h2 { font-size:1.15rem; font-weight:700; margin-bottom:14px; }
    .modal input { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px; font-size:0.95rem; margin-bottom:8px; }
    .modal input:focus { outline:2px solid var(--primary); border-color:transparent; }
    .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:12px; }
    .msg { font-size:0.82rem; padding:7px 12px; border-radius:8px; margin-bottom:8px; }
    .msg-success { background:#dcfce7; color:#166534; }
    .msg-duplicate { background:#fef9c3; color:#854d0e; }
    .msg-error,.msg-invalid { background:#fee2e2; color:#991b1b; }
    .msg-parsing { background:#f3f4f6; color:var(--muted); }

    .modal-wide { width:min(600px,95vw); }
    .modal-map { width:100%; height:280px; border-radius:8px; margin:8px 0; }
    .modal-map-hint { font-size:0.82rem; color:var(--muted); margin-bottom:4px; }
    .modal-name-row { margin-bottom:8px; }
    .modal-name-row label, .modal-cat-row label { display:block; font-size:0.8rem; color:var(--muted); margin-bottom:4px; font-weight:500; }
    .modal-cat-row { margin-bottom:10px; }
    .modal-name-row input { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:0.95rem; }
    .modal-name-row input:focus { outline:2px solid var(--primary); border-color:transparent; }

    .random-modal { text-align:center; padding:36px 28px; }
    .random-modal-label { font-size:0.78rem; font-weight:700; color:var(--primary); text-transform:uppercase; letter-spacing:.1em; margin-bottom:10px; }
    .random-modal-name { font-size:1.8rem; font-weight:800; color:var(--title); margin-bottom:14px; line-height:1.2; }
    .random-modal-meta { display:flex; justify-content:center; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .meta-tag { background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:3px 12px; font-size:0.82rem; color:var(--text); }
    .random-modal-info { font-size:0.88rem; color:var(--muted); margin-bottom:4px; }
    .random-modal-actions { display:flex; justify-content:center; gap:10px; margin-top:20px; }
    .random-modal-actions .btn-primary { text-decoration:none; padding:9px 20px; border-radius:8px; font-size:0.9rem; }

    .site-footer { text-align:center; padding:16px; font-size:0.8rem; color:var(--muted); }
    .site-footer a { color:var(--muted); text-decoration:none; }
    .site-footer a:hover { color:var(--primary); }
    .demo-banner { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:#1c1917; color:#fef3c7; padding:8px 20px; border-radius:20px; font-size:0.8rem; z-index:200; white-space:nowrap; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React

// ── 設定 ──────────────────────────────────────────
const OFFICE = { lat: 25.0333774, lng: 121.5543794, zh: '塔圖科技', en: 'Tagtoo' }
const API_URL = 'https://script.google.com/macros/s/AKfycbwxdsx-NXa-Es9vdJbjMgAr4JgvC6gWU2EoB4zmg8i3ggBYsk-HPAlY3F0gTjVlJDiF/exec'

// ── i18n ──────────────────────────────────────────
const I18N = {
  zh: {
    title: '今天午餐吃什麼', add: '新增餐廳', spin: '開始抽籤！', spinning: '抽籤中...', random: '隨便',
    result: '今天吃這間！', filters: '篩選條件', distance: '距離範圍',
    category: '類型', price: '價位', allCat: '全部', allPrice: '全部',
    cats: ['便當','麵食','早午餐','水餃鍋貼','咖哩/丼飯','速食/美式','東南亞','素食','健康餐'],
    dist: { 0:'全部', 100:'100公尺內', 200:'200公尺內', 350:'350公尺內', 500:'500公尺內' },
    prices: { 1:'$ 平價', 2:'$$ 普通', 3:'$$$ 稍貴' },
    hours: '營業時間', rating: '同事評價', viewMap: '查看地圖 ↗', todayEat: '今天就吃這間！', close: '關閉',
    noResult: '沒有符合條件的餐廳，請調整篩選', mapTitle: '附近餐廳地圖',
    count: n => `共 ${n} 間`,
    modal: { title:'新增餐廳', hint:'貼上 Google Maps 連結', next:'下一步', submit:'確認新增', cancel:'取消',
      parsing:'解析中...', success:'新增成功！', duplicate:'這間已在名單內 😄',
      error:'新增失敗，請再試一次', invalid:'請貼上 Google Maps 連結',
      clickHint:'點擊地圖上的餐廳位置以標記正確座標', pinSet:'📍 位置已標記，確認後送出',
      nameLabel:'餐廳名稱', noPin:'請先在地圖上點擊標記位置' },
    demo: '⚠️ 示範模式：尚未設定 API，顯示範例資料',
  },
  en: {
    title: "What's for Lunch Today?", add: 'Add Restaurant', spin: 'Spin!', spinning: 'Spinning...', random: 'Random',
    result: "Today's pick!", filters: 'Filters', distance: 'Distance',
    category: 'Category', price: 'Price', allCat: 'All', allPrice: 'All Prices',
    cats: ['Bento','Noodles','Brunch','Dumplings','Curry/Rice Bowl','Fast Food/American','Southeast Asian','Vegetarian','Healthy'],
    dist: { 0:'All', 100:'Within 100m', 200:'Within 200m', 350:'Within 350m', 500:'Within 500m' },
    prices: { 1:'Budget', 2:'Moderate', 3:'Pricey' },
    hours: 'Hours', rating: 'Rating', viewMap: 'View on Map ↗', todayEat: "Today's pick!", close: 'Close',
    noResult: 'No restaurants match. Try adjusting filters.', mapTitle: 'Nearby Restaurants',
    count: n => `${n} restaurant${n!==1?'s':''}`,
    modal: { title:'Add Restaurant', hint:'Paste a Google Maps link', next:'Next', submit:'Add Restaurant', cancel:'Cancel',
      parsing:'Adding...', success:'Added!', duplicate:'Already on the list 😄',
      error:'Failed to add. Please try again.', invalid:'Please paste a Google Maps link',
      clickHint:'Click on the restaurant location on the map to set exact coordinates', pinSet:'📍 Location marked — ready to submit',
      nameLabel:'Restaurant Name', noPin:'Please click the map to mark location' },
    demo: '⚠️ Demo mode: API not set, showing sample data',
  },
}

// ── 距離計算 ───────────────────────────────────────
function calcDist(lat1,lng1,lat2,lng2){
  const R=6371000, r=d=>d*Math.PI/180
  const a=Math.sin(r(lat2-lat1)/2)**2+Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(r(lng2-lng1)/2)**2
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))
}
function fmtDist(m){ return m<1000?`${Math.round(m)}m`:`${(m/1000).toFixed(1)}km` }
function walkTime(m,lang){ const min=Math.max(1,Math.round(m/80)); return lang==='zh'?`步行約 ${min} 分鐘`:`~${min} min walk` }

// ── 範例資料 ───────────────────────────────────────
const DEMO = [
  { id:'1', name:'鬍鬚張魯肉飯', name_en:"Hu Xu Zhang", category:'台式', price_level:'1', hours:'10:00-21:00', rating:'4.2', url:'https://maps.google.com', lat:'25.0340', lng:'121.5530' },
  { id:'2', name:'麥當勞', name_en:"McDonald's", category:'速食', price_level:'1', hours:'24小時', rating:'3.8', url:'https://maps.google.com', lat:'25.0320', lng:'121.5560' },
  { id:'3', name:'初魚料理', name_en:'Hatsuuo Japanese', category:'日式', price_level:'3', hours:'11:30-14:00', rating:'4.6', url:'https://maps.google.com', lat:'25.0350', lng:'121.5550' },
  { id:'4', name:'爭鮮迴轉壽司', name_en:'Sushiro', category:'日式', price_level:'2', hours:'11:00-21:30', rating:'4.1', url:'https://maps.google.com', lat:'25.0315', lng:'121.5545' },
  { id:'5', name:'吉野家', name_en:'Yoshinoya', category:'日式', price_level:'1', hours:'10:00-22:00', rating:'3.9', url:'https://maps.google.com', lat:'25.0328', lng:'121.5535' },
]

async function fetchData(){
  if(!API_URL) return DEMO
  const r=await fetch(`${API_URL}?action=list`)
  const d=await r.json()
  return d.restaurants||[]
}

// ── 類型自動偵測 ───────────────────────────────────
const CAT_RULES = [
  { cat:'麵食',     keywords:['麵','意麵','拉麵','烏龍','米線','河粉','板麵','刀削'] },
  { cat:'早午餐',   keywords:['早午餐','brunch','早餐','吐司','鬆餅','歐姆','蛋餅'] },
  { cat:'水餃鍋貼', keywords:['水餃','鍋貼','餃'] },
  { cat:'咖哩/丼飯', keywords:['咖哩','丼飯','丼','すき家','吉野家','sukiya','curry'] },
  { cat:'速食/美式', keywords:['麥當勞','肯德基','漢堡','subway','速食','美式','炸雞','pizza','比薩'] },
  { cat:'東南亞',   keywords:['泰式','越南','印尼','馬來','泰國','pho','打拋','東南亞','南洋'] },
  { cat:'素食',     keywords:['素食','蔬食','純素','素'] },
  { cat:'健康餐',   keywords:['健康','沙拉','輕食','低卡','nutrition'] },
  { cat:'便當',     keywords:['便當','自助餐','雞肉飯','燒臘','滷肉飯','排骨飯','控肉','食堂','廚房','小吃','餐盒','飯'] },
]

function detectCategory(name){
  const n = name.toLowerCase()
  for(const {cat, keywords} of CAT_RULES){
    if(keywords.some(k => n.includes(k))) return cat
  }
  return ''
}

// ── AddModal ───────────────────────────────────────
// 從 Google Maps URL 解析名稱與大概座標（純前端）
function parseMapUrl(url){
  let lat=null, lng=null, name=''
  const placeMatch = url.match(/maps\/place\/([^/@]+)\/@([-\d.]+),([-\d.]+)/)
  if(placeMatch){ name=decodeURIComponent(placeMatch[1].replace(/\+/g,' ')); lat=parseFloat(placeMatch[2]); lng=parseFloat(placeMatch[3]) }
  if(!lat){ const m=url.match(/[?&](?:q|ll)=([-\d.]+),([-\d.]+)/); if(m){lat=parseFloat(m[1]);lng=parseFloat(m[2])} }
  if(!lat){ const m=url.match(/@([-\d.]+),([-\d.]+)/); if(m){lat=parseFloat(m[1]);lng=parseFloat(m[2])} }
  return { name, lat, lng }
}

function AddModal({ t, lang, onClose, onAdded }){
  const [step,setStep]=useState(1)       // 1: 輸入URL  2: 地圖點選
  const [url,setUrl]=useState('')
  const [name,setName]=useState('')
  const [pin,setPin]=useState(null)      // {lat, lng}
  const [center,setCenter]=useState([OFFICE.lat, OFFICE.lng])
  const [category,setCategory]=useState('')
  const [st,setSt]=useState('idle')
  const mapRef=useRef(null)
  const mapInst=useRef(null)
  const markerRef=useRef(null)
  const pinRef=useRef(null)
  useEffect(()=>{ pinRef.current=pin },[pin])

  function placeMarker(map, lat, lng){
    if(markerRef.current) markerRef.current.remove()
    markerRef.current=L.marker([lat,lng],{icon:L.divIcon({className:'',html:'<div style="font-size:22px">📍</div>',iconSize:[22,22],iconAnchor:[11,22]})}).addTo(map)
  }

  // 初始化步驟2地圖
  useEffect(()=>{
    if(step!==2||!mapRef.current||mapInst.current) return
    const map=L.map(mapRef.current).setView(center,17)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map)
    L.marker([OFFICE.lat,OFFICE.lng],{icon:L.divIcon({className:'',html:'<div class="office-marker">🏢</div>',iconSize:[28,28],iconAnchor:[14,14]})}).addTo(map)
    map.on('click',e=>{
      const {lat,lng}=e.latlng
      setPin({lat,lng})
      placeMarker(map,lat,lng)
    })
    mapInst.current=map
    setTimeout(()=>{
      map.invalidateSize()
      // 若已有解析座標，自動放置標記
      if(pinRef.current) placeMarker(map, pinRef.current.lat, pinRef.current.lng)
    },100)
  },[step])

  function goStep2(){
    const v=url.trim()
    if(!v.includes('google')&&!v.includes('maps')&&!v.includes('goo.gl')){ setSt('invalid'); return }
    const parsed=parseMapUrl(v)
    if(parsed.name){ setName(parsed.name); setCategory(detectCategory(parsed.name)) }
    if(parsed.lat){
      setCenter([parsed.lat, parsed.lng])
      setPin({lat:parsed.lat, lng:parsed.lng})
    }
    setSt('idle')
    setStep(2)
  }

  async function submit(){
    if(!pin){ setSt('noPin'); return }
    setSt('parsing')
    try{
      const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'add', url:url.trim(), name, category, lat:pin.lat, lng:pin.lng})})
      const d=await r.json()
      if(d.status==='duplicate') setSt('duplicate')
      else if(d.status==='ok'){ setSt('success'); setTimeout(()=>{onAdded();onClose()},1200) }
      else setSt('error')
    }catch{ setSt('error') }
  }

  const msgMap={success:t.modal.success,duplicate:t.modal.duplicate,error:t.modal.error,
    invalid:t.modal.invalid,parsing:t.modal.parsing,noPin:t.modal.noPin}

  return (
    <div className="backdrop" onClick={onClose}>
      <div className={`modal${step===2?' modal-wide':''}`} onClick={e=>e.stopPropagation()}>
        <h2>{t.modal.title}</h2>

        {step===1&&(
          <>
            <input type="url" value={url} onChange={e=>{setUrl(e.target.value);setSt('idle')}}
              placeholder={t.modal.hint} autoFocus />
            {msgMap[st]&&<div className={`msg msg-${st}`}>{msgMap[st]}</div>}
            <div className="modal-actions">
              <button type="button" className="btn-secondary" onClick={onClose}>{t.modal.cancel}</button>
              <button type="button" className="btn-primary" onClick={goStep2}>{t.modal.next} →</button>
            </div>
          </>
        )}

                {t.cats.map(c=><button type="button" key={c} className={`chip${category===c?' active':''}`} onClick={()=>setCategory(c)}>{c}</button>)}

            </div>
            <p className="modal-map-hint">{t.modal.clickHint}</p>
            <div ref={mapRef} className="modal-map"></div>

              <button type="button" className="btn-secondary" onClick={()=>{setStep(1);mapInst.current=null;setPin(null)}}>{t.modal.cancel}</button>
              <button type="button" className="btn-primary" onClick={submit} disabled={st==='parsing'||st==='success'}>
                {st==='parsing'?t.modal.parsing:t.modal.submit}

            </div>
          </>
        )}
      </div>
    </div>
  )
}

// ── SpinWheel ──────────────────────────────────────
function SpinWheel({ t, lang, candidates, allRests, onWin, onRandom, onStartRandom }){
  const [spinning,setSpinning]=useState(false)
  const [display,setDisplay]=useState(null)
  const [winner,setWinner]=useState(null)
  const timer=useRef(null)
  const onRandomRef=useRef(onRandom)
  useEffect(()=>{ onRandomRef.current=onRandom },[onRandom])

  useEffect(()=>()=>clearTimeout(timer.current),[])

  function spin(){
    if(spinning||!candidates.length) return
    setWinner(null); setSpinning(true)
    const picked=candidates[Math.floor(Math.random()*candidates.length)]
    const start=Date.now()
    function tick(){
      const p=(Date.now()-start)/3000
      if(p>=1){ setDisplay(picked); setWinner(picked); setSpinning(false); onWin(picked); return }
      const interval=60+(400-60)*p**2
      setDisplay(candidates[Math.floor(Math.random()*candidates.length)])
      timer.current=setTimeout(tick,interval)
    }
    tick()
  }

  function spinRandom(){
    if(spinning||!allRests.length) return
    setWinner(null); setSpinning(true); onStartRandom()
    const picked=allRests[Math.floor(Math.random()*allRests.length)]
    const DURATION=2000
    const start=Date.now()
    function tick(){
      const elapsed=Date.now()-start
      if(elapsed>=DURATION){
        setDisplay(picked); setSpinning(false); onRandomRef.current(picked); return
      }
      setDisplay(allRests[Math.floor(Math.random()*allRests.length)])
      timer.current=setTimeout(tick,50)
    }
    tick()
  }

  const nk=lang==='zh'?'name':'name_en'
  return (
    <div className="card" style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
      <div className={`spin-display${spinning?' spinning':''}${winner?' won':''}`}>
        {winner?(
          <>
            <div className="result-label">{t.result}</div>
            <div className="result-name">{winner[nk]||winner.name}</div>
            {winner.distance!=null&&<div className="result-meta">📍 {fmtDist(winner.distance)} · 🚶 {walkTime(winner.distance,lang)}</div>}
            {winner.hours&&<div className="result-meta">🕐 {winner.hours}</div>}
            {winner.rating&&<div className="result-meta">⭐ {winner.rating}</div>}
            {winner.url&&<a href={winner.url} target="_blank" className="result-link">{t.viewMap}</a>}
          </>
        ):display?(
          <div className="rolling-name">{display[nk]||display.name}</div>
        ):(
          <div className="spin-placeholder">🍱</div>
        )}
      </div>
      <div style={{display:'flex',gap:10,width:'100%'}}>
        <button className="btn-spin" onClick={spin} disabled={spinning||!candidates.length} style={{flex:7}}>
          {spinning?t.spinning:t.spin}
        </button>
        <button className="btn-random" onClick={spinRandom} disabled={spinning||!allRests.length} style={{flex:3}}>
          🎲 {t.random}
        </button>
      </div>
      {!candidates.length&&<p className="no-result">{t.noResult}</p>}
    </div>
  )
}

// ── Map ────────────────────────────────────────────
function RestaurantMap({ t, lang, restaurants, winner, distFilter }){
  const mapRef=useRef(null)
  const instanceRef=useRef(null)
  const markersRef=useRef([])

  useEffect(()=>{
    if(instanceRef.current) return
    const map=L.map(mapRef.current).setView([OFFICE.lat,OFFICE.lng],15)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(map)
    L.marker([OFFICE.lat,OFFICE.lng],{icon:L.divIcon({className:'',html:'<div class="office-marker">🏢</div>',iconSize:[32,32],iconAnchor:[16,16]})})
      .addTo(map).bindPopup(lang==='zh'?OFFICE.zh:OFFICE.en)
    instanceRef.current=map
  },[])

  useEffect(()=>{
    const map=instanceRef.current
    if(!map) return
    markersRef.current.forEach(m=>m.remove())
    markersRef.current=[]
    if(instanceRef.current._distCircle){ instanceRef.current._distCircle.remove() }
    if(distFilter>0){
      instanceRef.current._distCircle=L.circle([OFFICE.lat,OFFICE.lng],{radius:distFilter,color:'#f97316',fillOpacity:.06}).addTo(map)
    }
    restaurants.forEach(r=>{
      const isWinner=winner?.id===r.id
      const nk=lang==='zh'?'name':'name_en'
      const label=r[nk]||r.name
      const icon=isWinner
        ?L.divIcon({className:'',html:`<div class="map-marker"><span class="marker-dot winner-dot"></span><span class="marker-label winner-label">${label}</span></div>`,iconSize:[0,0],iconAnchor:[8,8]})
        :L.divIcon({className:'',html:`<div class="map-marker"><span class="marker-dot"></span><span class="marker-label">${label}</span></div>`,iconSize:[0,0],iconAnchor:[4,4]})
      const m=L.marker([parseFloat(r.lat),parseFloat(r.lng)],{icon}).addTo(map)
      m.bindPopup(`<strong>${r[nk]||r.name}</strong>${r.distance?`<br>📍 ${fmtDist(r.distance)} · 🚶 ${walkTime(r.distance,lang)}`:''}${r.hours?`<br>🕐 ${r.hours}`:''}${r.rating?`<br>⭐ ${r.rating}`:''}${r.url?`<br><a href="${r.url}" target="_blank">${t.viewMap}</a>`:''}`)
      markersRef.current.push(m)
    })
  },[restaurants,winner,distFilter])

  const prevWinnerRef=useRef(undefined)
  useEffect(()=>{
    if(!instanceRef.current) return
    if(winner){ instanceRef.current.flyTo([winner.lat,winner.lng],16,{duration:1}) }
    else if(prevWinnerRef.current){ instanceRef.current.flyTo([OFFICE.lat,OFFICE.lng],15,{duration:0.8}) }
    prevWinnerRef.current=winner
  },[winner])

  return (
    <div className="card" style={{flex:1}}>
      <div className="section-title">{t.mapTitle}</div>
      <div ref={mapRef} id="map"></div>
    </div>
  )
}

        <div className="header-actions">
          <button className="btn-add" onClick={()=>setShowAdd(true)}>+ {t.add}</button>
          <button className="lang-toggle" onClick={()=>setLang(l=>l==='zh'?'en':'zh')}>{lang==='zh'?'EN':'中文'}</button>
        </div>
      </header>

      <main className="main">
        <div className="left-panel">
          {/* 篩選 */}
          <div className={`card${randomizing?' card-dimmed':''}`}>
            <div className="section-title">{t.filters}</div>
            <div className="filter-row">
              <label>{t.distance}</label>
              <div className="chips">
                {DISTS.map(d=><button key={d} className={`chip${!randomizing&&filters.dist===d?' active':''}`} onClick={()=>!randomizing&&setFilters(f=>({...f,dist:d}))}>{t.dist[d]}</button>)}
              </div>
            </div>
            <div className="filter-row">
              <label>{t.category}</label>
              <div className="chips">
                <button className={`chip${!randomizing&&filters.cat===''?' active':''}`} onClick={()=>!randomizing&&setFilters(f=>({...f,cat:''}))}>{t.allCat}</button>
                {t.cats.map((c)=><button key={c} className={`chip${!randomizing&&filters.cat===c?' active':''}`} onClick={()=>!randomizing&&setFilters(f=>({...f,cat:c}))}>{c}</button>)}
              </div>
            </div>
          </div>
          <p className="count">{t.count(candidates.length)}</p>
          <SpinWheel t={t} lang={lang} candidates={candidates} allRests={rests} onWin={setWinner} onStartRandom={()=>{ setRandomizing(true); setWinner(null); setFilters({dist:0,cat:'',price:0}); }} onRandom={(picked)=>{ setRandomizing(false); setFilters({dist:0,cat:'',price:0}); setRandomPick(picked); }} />
        </div>

        <div className="right-panel">
          {!loading&&<RestaurantMap t={t} lang={lang} restaurants={candidates} winner={winner} distFilter={filters.dist} />}
        </div>
      </main>

      {showAdd&&<AddModal t={t} lang={lang} onClose={()=>setShowAdd(false)} onAdded={load} />}
      {randomPick&&<RandomResultModal t={t} lang={lang} restaurant={randomPick} onClose={()=>setRandomPick(null)} />}
      {!API_URL&&<div className="demo-banner">{t.demo}</div>}
      <footer className="site-footer">👨‍💻 by <a href="mailto:sandra.shih@tagtoo.com">Sandra Shih</a></footer>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
